<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="manifest" href="/manifest.json" />
    <meta name="theme-color" content="#0a0a0a" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="FY Intech CRM - Global Enterprise Customer Relationship Management" />
    <title>FY Intech CRM</title>
    <script>
      if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('/sw.js').catch(() => {});
      }
    </script>
    <script>
      try {
        var p = JSON.parse(localStorage.getItem('crm_prefs') || '{}');
        var isDark = p.darkMode !== false;
        var root = document.documentElement;
        root.setAttribute('data-theme', isDark ? 'dark' : 'light');
        var vars = isDark
          ? { '--color-crm-dark':'#0a0a0a','--color-crm-darker':'#000000','--color-crm-card':'#121212','--color-crm-border':'#262626','--color-crm-text':'#ffffff','--color-crm-textMuted':'#a3a3a3' }
          : { '--color-crm-dark':'#f1f5f9','--color-crm-darker':'#f8fafc','--color-crm-card':'#ffffff','--color-crm-border':'#e2e8f0','--color-crm-text':'#0f172a','--color-crm-textMuted':'#64748b' };
        Object.keys(vars).forEach(function(k){ root.style.setProperty(k, vars[k]); });
      } catch (_) {}
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
